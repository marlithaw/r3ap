<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R³.A.P. Response Studio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-teal': '#0f5b5b',
                        'brand-teal-light': '#187b7a',
                        'brand-gold': '#c09e6c',
                        'brand-gold-light': '#dfc59a',
                        'brand-orange': '#f08a42',
                        'studio-bg': '#f8f5ef',
                        'live-bg': '#f9f9f7',
                        'brand-dark': '#1a202c'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        live: ['Inter', 'sans-serif']
                    },
                    boxShadow: {
                        'luxury': '0 10px 30px rgba(15, 91, 91, 0.08)',
                        'glow-teal': '0 0 20px rgba(24, 123, 122, 0.2)',
                    }
                }
            }
        }
    </script>
    
    <style>
        /* True App Baseline */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #000; /* Dark background for the image borders */
            -webkit-font-smoothing: antialiased;
        }

        /* App Container */
        #app {
            width: 100vw; height: 100vh;
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative;
            transition: background-color 0.3s ease;
        }

        /* Scrollable Content Area */
        #screens-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: 80px; /* Space for fixed bottom nav */
        }

        /* Safe area padding for mobile navigation */
        .nav-safe-bottom {
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
        }

        .screen {
            display: none; 
            width: 100%; 
            min-height: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }
        .screen.active { display: block; }
        
        .studio-background {
            background-color: #f8f5ef;
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 60%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Max-Width Wrapper for Content */
        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem;
            width: 100%;
        }

        /* Typography & Utilities */
        .font-serif { font-family: 'Playfair Display', serif; }
        .icon-svg { stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Custom UI Components */
        .btn-luxury {
            background: linear-gradient(90deg, #0f5b5b, #187b7a);
            border: 1px solid #c09e6c; color: white;
            box-shadow: 0 4px 15px rgba(15, 91, 91, 0.3); transition: all 0.2s ease;
        }
        .btn-luxury:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15, 91, 91, 0.4); }
        .btn-luxury:active { transform: scale(0.98); }
        
        .luxury-divider {
            display: flex; align-items: center; justify-content: center; margin: 1rem 0; color: #c09e6c;
        }
        .luxury-divider::before, .luxury-divider::after {
            content: ''; height: 1px; width: 30px; background-color: #c09e6c; margin: 0 10px;
        }

        /* Teacher Reset Animation */
        .breathing-circle {
            width: 200px; height: 200px; border-radius: 50%; border: 2px solid #0f5b5b;
            background: rgba(15, 91, 91, 0.05); display: flex; align-items: center; justify-content: center;
            animation: breathe 10s infinite ease-in-out; margin: 0 auto;
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* I to T Transformation */
        .i-to-t-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60px; }
        .letter-top, .letter-bottom { height: 4px; background-color: #c09e6c; transition: all 0.8s ease; border-radius: 2px; }
        .letter-stem { width: 4px; height: 35px; background-color: #c09e6c; border-radius: 2px; }
        .letter-top { width: 16px; } .letter-bottom { width: 16px; opacity: 1; }
        .transformed .letter-top { width: 44px; } .transformed .letter-bottom { width: 0px; opacity: 0; }

        /* Pulse Hitbox Animation for interactive images */
        .pulse-hitbox {
            animation: pulse-glow 2.5s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>

<div id="app">
    
    <!-- MAIN SCROLLABLE AREA -->
    <div id="screens-container">
        
        <!-- ==========================================
             SCREEN: SPLASH / WELCOME 
             Using provided actual image mockup
             ========================================== -->
        <div id="screen-splash" class="screen active bg-black">
            <div class="h-full w-full flex items-center justify-center p-0">
                <div class="relative w-full h-full max-w-md mx-auto aspect-[9/19.5]">
                    <!-- The Provided Image -->
                    <img src="Welcome Screen.jpg" class="w-full h-full object-contain object-center pointer-events-none" alt="Welcome to RAP">
                    
                    <!-- Interactive Button Hitbox mapped perfectly over the "Press Play" graphic -->
                    <button onclick="navTo('screen-dashboard')" 
                            class="absolute w-[68%] h-[8%] bottom-[16%] left-1/2 transform -translate-x-1/2 
                                   bg-white/0 hover:bg-white/20 active:bg-white/30 transition-all duration-300 rounded-[2rem] 
                                   focus:outline-none pulse-hitbox border border-white/20"
                            aria-label="Press Play to Enter">
                    </button>
                </div>
            </div>
        </div>

        <!-- ==========================================
             SCREEN: HOME / DASHBOARD 
             ========================================== -->
        <div id="screen-dashboard" class="screen studio-background">
            <div class="content-wrapper">
                <div class="text-center mb-8 pt-6">
                    <h1 class="font-serif text-3xl font-bold text-brand-teal tracking-wide">R³.A.P. Response Studio</h1>
                    <p class="text-sm text-gray-600 mt-2 max-w-xl mx-auto">A teacher-facing response system that reduces improvisation in high-stress classroom moments.</p>
                    <div class="luxury-divider mt-4">
                        <span class="text-[9px] tracking-[0.2em] font-bold text-brand-teal uppercase">Master Your Freestyle</span>
                    </div>
                </div>
                
                <!-- Status Bar -->
                <div class="bg-white rounded-xl p-4 shadow-sm border border-brand-gold/30 mb-8 flex justify-between items-center text-sm font-medium text-brand-dark">
                    <div class="flex items-center"><span class="w-2 h-2 rounded-full bg-brand-teal mr-2"></span> Grade Band: K-8</div>
                    <div class="text-brand-gold">Status: Studio Active</div>
                </div>

                <!-- Dashboard Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="startLiveState()" class="bg-gradient-to-r from-brand-orange to-[#e56a17] text-white rounded-2xl p-6 shadow-luxury flex items-center justify-between group hover:opacity-95 transition text-left">
                        <div>
                            <h3 class="font-serif text-2xl font-bold mb-1">Use It Live</h3>
                            <p class="text-xs text-white/80 uppercase tracking-wider font-bold">Fast Access Scripts</p>
                        </div>
                        <div class="bg-white/20 p-3 rounded-full group-hover:scale-110 transition"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
                    </button>

                    <button onclick="navTo('screen-library')" class="bg-white border border-brand-gold/30 rounded-2xl p-6 shadow-luxury flex items-center justify-between group hover:border-brand-teal transition text-left">
                        <div>
                            <h3 class="font-serif text-xl font-bold text-brand-teal mb-1">Module Library</h3>
                            <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Teach a Routine</p>
                        </div>
                        <div class="text-brand-teal bg-brand-cream p-3 rounded-full"><svg class="w-5 h-5 icon-svg" viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></div>
                    </button>

                    <!-- Navigates to Intro Image before Practice -->
                    <button onclick="navTo('screen-practice-intro')" class="bg-white border border-brand-gold/30 rounded-2xl p-6 shadow-luxury flex items-center justify-between group hover:border-brand-teal transition text-left">
                        <div>
                            <h3 class="font-serif text-xl font-bold text-brand-teal mb-1">Practice Scenarios</h3>
                            <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Rehearse</p>
                        </div>
                        <div class="text-brand-teal bg-brand-cream p-3 rounded-full"><svg class="w-5 h-5 icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></div>
                    </button>

                    <button onclick="navTo('screen-reflect')" class="bg-white border border-brand-gold/30 rounded-2xl p-6 shadow-luxury flex items-center justify-between group hover:border-brand-teal transition text-left">
                        <div>
                            <h3 class="font-serif text-xl font-bold text-brand-teal mb-1">Track & Reflect</h3>
                            <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Export Evidence</p>
                        </div>
                        <div class="text-brand-teal bg-brand-cream p-3 rounded-full"><svg class="w-5 h-5 icon-svg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- ==========================================
             SCREEN: LIBRARY (Module Selection)
             ========================================== -->
        <div id="screen-library" class="screen studio-background">
            <div class="content-wrapper">
                <div class="text-center mb-8 pt-4">
                    <p class="text-xs tracking-[0.2em] font-bold text-brand-gold uppercase mb-2">Liner Notes</p>
                    <h2 class="font-serif text-4xl font-bold text-brand-teal leading-tight">Module Library</h2>
                    <p class="text-sm text-gray-600 mt-2">Select a track to build your response.</p>
                </div>
                
                <div id="library-list" class="flex flex-col space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- ==========================================
             SCREEN: MODULE DETAILS (The 14 Sections)
             ========================================== -->
        <div id="screen-module" class="screen studio-background">
            <div class="content-wrapper">
                <!-- Populated by JS to include all 14 required sections -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN: TEACH IT MODE
             ========================================== -->
        <div id="screen-teach" class="screen studio-background">
            <div class="content-wrapper">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN: USE IT LIVE (High Contrast / Fast)
             ========================================== -->
        <div id="screen-live" class="screen font-live bg-live-bg">
            <div class="content-wrapper min-h-full flex flex-col pt-8">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN: PRACTICE INTRO
             Uses the "Lift The Needle" custom image mockup
             ========================================== -->
        <div id="screen-practice-intro" class="screen bg-black">
            <div class="h-full w-full flex items-center justify-center p-0 relative">
                <div class="relative w-full h-full max-w-md mx-auto aspect-[9/19.5]">
                    <!-- Top hidden back button map just to be safe if user wants to exit -->
                    <button onclick="navTo('screen-dashboard')" class="absolute z-10 top-[6%] left-[6%] w-[15%] h-[5%] rounded-full focus:outline-none"></button>
                    
                    <!-- The Provided Image -->
                    <img src="Lift the needle on the Scractched Record.jpg" class="w-full h-full object-contain object-center pointer-events-none" alt="Lift the Needle">
                    
                    <!-- Interactive Button Hitbox mapped perfectly over the "Lift The Needle" graphic -->
                    <button onclick="navTo('screen-practice')" 
                            class="absolute w-[80%] h-[8%] bottom-[12%] left-1/2 transform -translate-x-1/2 
                                   bg-white/0 hover:bg-white/20 active:bg-white/30 transition-all duration-300 rounded-[2rem] 
                                   focus:outline-none pulse-hitbox border border-white/20"
                            aria-label="Lift the needle and begin practice">
                    </button>
                </div>
            </div>
        </div>

        <!-- ==========================================
             SCREEN: PRACTICE MODE
             ========================================== -->
        <div id="screen-practice" class="screen studio-background">
            <div class="content-wrapper">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN: REFLECT & REPORT
             ========================================== -->
        <div id="screen-reflect" class="screen studio-background">
            <div class="content-wrapper">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN: TEACHER RESET (Breathing)
             ========================================== -->
        <div id="screen-reset" class="screen font-live bg-live-bg">
            <div class="content-wrapper min-h-full flex flex-col justify-center items-center text-center">
                <!-- Populated by JS -->
            </div>
        </div>

    </div> <!-- End screens container -->

    <!-- ==========================================
         FIXED BOTTOM NAVIGATION 
         ========================================== -->
    <nav id="main-nav" class="fixed bottom-0 left-0 w-full bg-white border-t border-brand-gold/20 flex justify-around items-end pt-3 nav-safe-bottom shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-[100] hidden">
        <button onclick="navTo('screen-dashboard')" class="flex-1 flex flex-col items-center text-brand-dark hover:text-brand-teal transition pb-1">
            <svg class="w-6 h-6 mb-1 icon-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider whitespace-nowrap">Studio</span>
        </button>
        <button onclick="navTo('screen-library')" class="flex-1 flex flex-col items-center text-brand-dark hover:text-brand-teal transition pb-1">
            <svg class="w-6 h-6 mb-1 icon-svg" viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider whitespace-nowrap">Library</span>
        </button>
        <button onclick="startLiveState()" class="flex-1 flex flex-col items-center text-brand-orange hover:opacity-80 transition transform -translate-y-2">
            <div class="bg-brand-orange text-white p-3 rounded-full shadow-lg border-2 border-white">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider mt-1 whitespace-nowrap">Live</span>
        </button>
        <button onclick="navTo('screen-practice-intro')" class="flex-1 flex flex-col items-center text-brand-dark hover:text-brand-teal transition pb-1">
            <svg class="w-6 h-6 mb-1 icon-svg" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider whitespace-nowrap">Practice</span>
        </button>
    </nav>

</div>

<!-- APPLICATION LOGIC & DATA ENGINE -->
<script>
    // 1. DATA SCHEMA FROM DESIGN SYSTEM
    const seedModules = [
        {
            id: "mod_1", category: "Entry routines", gradeBands: ["K-2", "3-5", "6-8"],
            title: "Assigned Seat / Entry",
            purpose: "Reduce doorway chaos and create a predictable classroom threshold.",
            studentSteps: ["Walk into the room.", "Check the board or seating chart.", "Go directly to your assigned seat.", "Sit down.", "Begin the posted task."],
            teacherTeachScript: "When you enter, check the seating chart, go to your assigned seat, and begin the Do Now. We will practice this until it feels automatic.",
            reminderScripts: ["What’s our entry routine?", "Show me assigned seat, then Do Now."],
            redirectScripts: ["Assigned seat, then Do Now.", "Check the seating chart and begin the Do Now."],
            followThroughScripts: ["You can move to your assigned seat and start, or I’ll use the next classroom support step."],
            repairScripts: ["When the seat assignment became public, it slowed the start of class. Tomorrow, what can you do when you disagree with a seat?"],
            commonTrapStrongerMove: { trap: "I already explained why I moved you.", strongerMove: "Assigned seat, then Do Now." },
            responsePathway: [
                { step: 1, label: "Remind", then: "What’s our entry routine?" },
                { step: 2, label: "Redirect", then: "Assigned seat, then Do Now." },
                { step: 3, label: "Follow Through", then: "You can move to your assigned seat or I'll use a support step." },
                { step: 4, label: "Repair", then: "What can you do tomorrow?" }
            ],
            traumaLens: { pattern: "Defiance at door", lookFor: "Hypervigilance / Peer performance", adultMove: "Lower voice, point to seat, step away." },
            practiceScenario: {
                scenario: "A student sees their new seat, stops in the doorway, and loudly complains: 'I'm not sitting there.'",
                studentSays: "I'm not sitting there.",
                choices: [
                    { text: "Why are you complaining? Sit down.", isCorrect: false, feedback: "This invites debate and public shame." },
                    { text: "Assigned seat, then Do Now.", isCorrect: true, feedback: "This returns the student to the routine clearly and calmly." },
                    { text: "You owe me a reset conversation.", isCorrect: false, feedback: "This is punitive and escalates the moment unnecessarily." }
                ]
            }
        },
        {
            id: "mod_2", category: "Learning space", gradeBands: ["K-2", "3-5", "6-8"],
            title: "Remaining Seated",
            purpose: "Protect the learning space and prevent movement from becoming the fastest way to get attention.",
            studentSteps: ["Stay in your learning space during work time.", "Use the class signal when help is needed.", "Keep working while waiting.", "Move only when the teacher gives permission."],
            teacherTeachScript: "During work time, your seat is your learning space. If you need help, use the signal and keep working while you wait. I will come to you.",
            reminderScripts: ["What do we do when we need help?", "Use the signal and keep working."],
            redirectScripts: ["Return to your seat. I’ll come to you.", "Back to your workspace and keep working."],
            followThroughScripts: ["If you keep leaving your seat, I’ll move your workspace closer so I can support you."],
            repairScripts: ["You needed help, but walking up changed the routine. Next time, signal first and I’ll come to you."],
            commonTrapStrongerMove: { trap: "Why are you out of your seat?", strongerMove: "Return to your seat. I’ll come to you." },
            responsePathway: [
                { step: 1, label: "Remind", then: "Use the signal and keep working." },
                { step: 2, label: "Redirect", then: "Return to your seat. I’ll come to you." },
                { step: 3, label: "Follow Through", then: "I’ll move your workspace closer so I can support you." },
                { step: 4, label: "Repair", then: "Next time, signal first and I’ll come to you." }
            ],
            traumaLens: { pattern: "Wandering", lookFor: "Task avoidance due to feeling unsafe/unsure", adultMove: "Proximity and private check-in." },
            practiceScenario: {
                scenario: "A student frustrated with a problem walks up to you, interrupting another conference.",
                studentSays: "I don't get this. It's stupid.",
                choices: [
                    { text: "Go back to your seat right now.", isCorrect: false, feedback: "Combative. Doesn't reaffirm the support routine." },
                    { text: "Return to your seat. I’ll come to you.", isCorrect: true, feedback: "Protects the learning space and affirms help is coming." },
                    { text: "(Sigh) Let me see your paper.", isCorrect: false, feedback: "Reinforces that breaking the routine gets immediate attention." }
                ]
            }
        },
        {
            id: "mod_3", category: "Language", gradeBands: ["6-8"],
            title: "Profanity / Language",
            purpose: "Separate emotion from harmful language and give students a path to restate frustration without shame.",
            studentSteps: ["Pause before speaking.", "Use classroom language.", "If profanity comes out, reset the sentence.", "Say the message again without profanity.", "Repair harm if directed at someone."],
            teacherTeachScript: "Frustration is allowed. Profanity is not. If the wrong word comes out, pause and say it again in a way we can work with.",
            reminderScripts: ["Use classroom language.", "Pause and try that again."],
            redirectScripts: ["Language reset. Try that again.", "Try that again without profanity."],
            followThroughScripts: ["Pause. We’ll reset this privately after class."],
            repairScripts: ["What words can you use next time without causing harm?"],
            commonTrapStrongerMove: { trap: "How dare you talk like that?", strongerMove: "Language reset. Try that again." },
            responsePathway: [
                { step: 1, label: "Redirect", then: "Language reset. Try that again." },
                { step: 2, label: "Follow Through", then: "Pause. We’ll reset this privately after class." },
                { step: 3, label: "Repair", then: "What words can you use next time?" }
            ],
            traumaLens: { pattern: "Swearing when stuck", lookFor: "Frustration masquerading as aggression", adultMove: "Focus on the emotion, redirect the language." },
            practiceScenario: {
                scenario: "A student breaks their pencil tip and loudly curses.",
                studentSays: "Oh, f***!",
                choices: [
                    { text: "Go to the office.", isCorrect: false, feedback: "Extreme escalation for an undirected emotional outburst." },
                    { text: "How dare you talk like that in my room?", isCorrect: false, feedback: "Makes it personal and increases conflict." },
                    { text: "Try that again without profanity.", isCorrect: true, feedback: "Allows correction of the mistake quickly, keeping dignity." }
                ]
            }
        }
    ];

    // STATE MANAGEMENT
    let activeModuleId = seedModules[0].id;
    let liveStepIndex = 0;
    let practiceAnswered = false;
    let practiceCorrect = false;

    // ICONS
    const Icons = {
        star: `<svg class="w-5 h-5 text-brand-gold mr-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>`,
        arrowLeft: `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
        check: `<svg class="w-5 h-5 text-brand-teal mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`
    };

    function getActiveModule() { return seedModules.find(m => m.id === activeModuleId); }

    // NAVIGATION SYSTEM
    function navTo(screenId, moduleId = null) {
        if (moduleId) activeModuleId = moduleId;
        
        // Hide all screens
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        
        // Toggle the visibility of the bottom nav based on active screen
        // Fullscreen mockup images shouldn't show the bottom nav overlaying them
        const bottomNav = document.getElementById('main-nav');
        const scrollContainer = document.getElementById('screens-container');
        
        if (screenId === 'screen-splash' || screenId === 'screen-practice-intro') {
            bottomNav.style.display = 'none';
            scrollContainer.style.paddingBottom = '0px';
        } else {
            bottomNav.style.display = 'flex';

            html += `
                <div class="bg-white p-8 md:p-12 rounded-3xl shadow-luxury border-2 ${practiceCorrect ? 'border-brand-teal' : 'border-brand-orange'} text-center mt-12">
